{% extends "base.html" %}
{% block title %}Login – SmartCampus Nav{% endblock %}
{% block extra_head %}
<style>
.auth-wrap{min-height:calc(100vh - 64px);display:flex;align-items:center;justify-content:center;padding:2rem}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2.5rem;width:100%;max-width:400px}
.auth-title{font-size:1.6rem;font-weight:700;margin-bottom:.3rem}
.auth-sub{color:var(--text-muted);font-size:.9rem;margin-bottom:2rem}
.auth-footer{text-align:center;margin-top:1.5rem;color:var(--text-muted);font-size:.875rem}
.auth-footer a{color:var(--accent);text-decoration:none}
.demo-box{background:rgba(88,166,255,.08);border:1px solid rgba(88,166,255,.2);border-radius:8px;padding:1rem;margin-bottom:1.5rem;font-size:.85rem;color:var(--text-muted)}
.demo-box strong{color:var(--accent)}
</style>
{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Login to your SmartCampus account</p>
    <div class="demo-box">
      💡 <strong>Demo:</strong> Register a new account to explore all features.
    </div>
    <form method="POST">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="you@college.edu" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Your password" required/>
      </div>
      <button type="submit" class="btn btn-primary btn-lg" style="width:100%">Login</button>
    </form>
    <div class="auth-footer">Don't have an account? <a href="{{ url_for('register') }}">Register here</a></div>
  </div>
</div>
{% endblock %}
